name: CI

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_call: # lets Build & Release gate installer builds on these tests

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy app/

      - name: Pytest
        run: uv run pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

  e2e-settings:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      # The Playwright webServer only starts the Vite dev server; the spec hits
      # the backend through Vite's /api proxy (→ :8000), so start a throwaway
      # backend here and wait for it to come up.
      - name: Start backend
        working-directory: backend
        env:
          DATA_DIR: /tmp/lifelogr-e2e
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/health >/dev/null; then echo "backend ready"; exit 0; fi
            sleep 1
          done
          echo "backend failed to start" && exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        # settings = UI smoke; entries = create→search round-trip through the
        # real backend, so a dead/wrong backend fails the suite.
        run: npx playwright test tests/settings.spec.ts tests/entries.spec.ts --reporter=line
