name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Linux Desktop (AppImage + deb) ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with: { enable-cache: true }

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev upx-ucl

      - name: Build frontend
        run: |
          VER=$(grep -m1 '"version"' desktop/src-tauri/tauri.conf.json | sed 's/.*: *"\(.*\)".*/\1/')
          echo "VITE_APP_VERSION=$VER"
          cd frontend && npm ci && VITE_APP_VERSION="$VER" npm run build

      - name: Build backend binary
        run: |
          cd backend && uv sync
          uv run pyinstaller ../desktop/scripts/pyinstaller.spec \
            --noconfirm --distpath ../desktop/dist --workpath ../desktop/build/pyinstaller

      - name: Prepare sidecar
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp desktop/dist/lifelogr-backend \
            desktop/src-tauri/binaries/lifelogr-backend-x86_64-unknown-linux-gnu
          chmod +x desktop/src-tauri/binaries/lifelogr-backend-x86_64-unknown-linux-gnu

      - name: Verify backend binary
        run: |
          ./desktop/dist/lifelogr-backend --host 127.0.0.1 --port 18765 &
          PID=$!; sleep 5
          curl -sf http://127.0.0.1:18765/health | grep -q ok
          kill $PID 2>/dev/null || true

      - name: Build Tauri (AppImage + deb)
        uses: tauri-apps/tauri-action@v0
        with:
          projectDir: desktop
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'LifeLogr ${{ github.ref_name }}'

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: desktop/src-tauri/target/release/bundle/

  # ── Windows Desktop (MSI) ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with: { enable-cache: true }

      - name: Install UPX
        run: choco install upx

      - name: Build frontend
        run: |
          VER=$(grep -m1 '"version"' desktop/src-tauri/tauri.conf.json | sed 's/.*: *"\(.*\)".*/\1/')
          echo "VITE_APP_VERSION=$VER"
          cd frontend && npm ci && VITE_APP_VERSION="$VER" npm run build

      - name: Build backend binary
        run: |
          cd backend && uv sync
          uv run pyinstaller ../desktop/scripts/pyinstaller.spec --noconfirm --distpath ../desktop/dist --workpath ../desktop/build/pyinstaller

      - name: Prepare sidecar
        run: |
          mkdir desktop\src-tauri\binaries
          copy desktop\dist\lifelogr-backend.exe desktop\src-tauri\binaries\lifelogr-backend-x86_64-pc-windows-msvc.exe

      - name: Build Tauri (MSI)
        uses: tauri-apps/tauri-action@v0
        with:
          projectDir: desktop
          tauriScript: cargo tauri

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: desktop/src-tauri/target/release/bundle/

  # ── macOS Desktop (DMG) ──
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with: { enable-cache: true }

      - name: Install UPX
        run: brew install upx

      - name: Build frontend
        run: |
          VER=$(grep -m1 '"version"' desktop/src-tauri/tauri.conf.json | sed 's/.*: *"\(.*\)".*/\1/')
          echo "VITE_APP_VERSION=$VER"
          cd frontend && npm ci && VITE_APP_VERSION="$VER" npm run build

      - name: Build backend binary
        run: |
          cd backend && uv sync
          uv run pyinstaller ../desktop/scripts/pyinstaller.spec --noconfirm --distpath ../desktop/dist --workpath ../desktop/build/pyinstaller

      - name: Prepare sidecar
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp desktop/dist/lifelogr-backend \
            desktop/src-tauri/binaries/lifelogr-backend-aarch64-apple-darwin
          chmod +x desktop/src-tauri/binaries/lifelogr-backend-aarch64-apple-darwin

      - name: Build Tauri (DMG)
        uses: tauri-apps/tauri-action@v0
        with:
          projectDir: desktop
          tauriScript: cargo tauri

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: desktop/src-tauri/target/release/bundle/
